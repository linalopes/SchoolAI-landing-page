<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atelier Space — 3D</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #22113E; overflow: hidden; font-family: 'Courier New', monospace; }
  canvas { display: block; }
  #ui {
    position: absolute;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    color: rgba(202,216,216,0.4);
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    pointer-events: none;
  }
  #label {
    position: absolute;
    top: 32px;
    left: 40px;
    color: rgba(202,216,216,0.25);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    pointer-events: none;
  }
  #label span {
    display: block;
    color: #EA7DFF;
    font-size: 18px;
    letter-spacing: -0.02em;
    font-family: 'Georgia', serif;
    text-transform: none;
    margin-top: 4px;
    opacity: 0.7;
  }
</style>
</head>
<body>
<div id="label">Wetzikon | Zurich<span>The Atelier Space</span></div>
<div id="ui">drag to explore · scroll to zoom</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const PHOTOS = [
  'https://media.linalopes.info/schoolai-space/IMG_3342.jpeg',
  'https://media.linalopes.info/schoolai-space/IMG_3343.jpeg',
  'https://media.linalopes.info/schoolai-space/IMG_3346.jpeg',
  'https://media.linalopes.info/schoolai-space/IMG_3348.jpeg',
  'https://media.linalopes.info/schoolai-space/IMG_3349.jpeg',
  'https://media.linalopes.info/schoolai-space/IMG_3350.jpeg',
  'https://media.linalopes.info/schoolai-space/IMG_3351.jpeg',
  'https://media.linalopes.info/schoolai-space/IMG_3352.jpeg',
  'https://media.linalopes.info/schoolai-space/IMG_3356.jpeg',
  'https://media.linalopes.info/schoolai-space/IMG_3357.jpeg',
  'https://media.linalopes.info/schoolai-space/IMG_3358.jpeg',
  'https://media.linalopes.info/schoolai-space/IMG_3364.jpeg',
  'https://media.linalopes.info/schoolai-space/IMG_3365.jpeg',
];

// Brand colors
const DEEP_PURPLE = new THREE.Color(0x22113E);
const PINK        = new THREE.Color(0xEA7DFF);
const TURQUOISE   = new THREE.Color(0x08F2DB);
const GRAY_GREEN  = new THREE.Color(0xCAD8D8);
const PURPLES     = [0x7F33EF, 0x9F62FF, 0x4F12C7, 0xEA7DFF, 0x08F2DB, 0xCAD8D8];

// Scene
const scene    = new THREE.Scene();
scene.background = new THREE.Color(0x22113E);
scene.fog = new THREE.FogExp2(0x22113E, 0.045);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 200);
camera.position.set(0, 0, 22);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// --- PERLIN NOISE (simplex-like fade) ---
function fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
function lerp(a, b, t) { return a + t * (b - a); }
function grad(hash, x, y, z) {
  const h = hash & 15;
  const u = h < 8 ? x : y;
  const v = h < 4 ? y : (h === 12 || h === 14 ? x : z);
  return ((h & 1) === 0 ? u : -u) + ((h & 2) === 0 ? v : -v);
}
const perm = new Uint8Array(512);
const p = new Uint8Array(256);
for (let i = 0; i < 256; i++) p[i] = i;
for (let i = 255; i > 0; i--) {
  const j = Math.floor(Math.random() * (i + 1));
  [p[i], p[j]] = [p[j], p[i]];
}
for (let i = 0; i < 512; i++) perm[i] = p[i & 255];
function noise3(x, y, z) {
  const X = Math.floor(x) & 255, Y = Math.floor(y) & 255, Z = Math.floor(z) & 255;
  x -= Math.floor(x); y -= Math.floor(y); z -= Math.floor(z);
  const u = fade(x), v = fade(y), w = fade(z);
  const A = perm[X] + Y, AA = perm[A] + Z, AB = perm[A + 1] + Z;
  const B = perm[X + 1] + Y, BA = perm[B] + Z, BB = perm[B + 1] + Z;
  return lerp(
    lerp(lerp(grad(perm[AA], x, y, z), grad(perm[BA], x-1, y, z), u),
         lerp(grad(perm[AB], x, y-1, z), grad(perm[BB], x-1, y-1, z), u), v),
    lerp(lerp(grad(perm[AA+1], x, y, z-1), grad(perm[BA+1], x-1, y, z-1), u),
         lerp(grad(perm[AB+1], x, y-1, z-1), grad(perm[BB+1], x-1, y-1, z-1), u), v), w
  );
}

// --- PARTICLES ---
const PARTICLE_COUNT = 3200;
const positions  = new Float32Array(PARTICLE_COUNT * 3);
const colors     = new Float32Array(PARTICLE_COUNT * 3);
const sizes      = new Float32Array(PARTICLE_COUNT);
const velocities = new Float32Array(PARTICLE_COUNT * 3);
const noiseOffsets = new Float32Array(PARTICLE_COUNT * 3);

const paletteCols = [
  new THREE.Color(0x9F62FF),
  new THREE.Color(0xEA7DFF),
  new THREE.Color(0x08F2DB),
  new THREE.Color(0xCAD8D8),
  new THREE.Color(0x7F33EF),
  new THREE.Color(0x4F12C7),
];

for (let i = 0; i < PARTICLE_COUNT; i++) {
  const r = 18 * Math.cbrt(Math.random());
  const theta = Math.random() * Math.PI * 2;
  const phi   = Math.acos(2 * Math.random() - 1);
  positions[i*3]   = r * Math.sin(phi) * Math.cos(theta);
  positions[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
  positions[i*3+2] = r * Math.cos(phi);
  const col = paletteCols[Math.floor(Math.random() * paletteCols.length)];
  colors[i*3]   = col.r;
  colors[i*3+1] = col.g;
  colors[i*3+2] = col.b;
  sizes[i] = 0.04 + Math.random() * 0.12;
  velocities[i*3]   = (Math.random() - 0.5) * 0.002;
  velocities[i*3+1] = (Math.random() - 0.5) * 0.002;
  velocities[i*3+2] = (Math.random() - 0.5) * 0.002;
  noiseOffsets[i*3]   = Math.random() * 100;
  noiseOffsets[i*3+1] = Math.random() * 100;
  noiseOffsets[i*3+2] = Math.random() * 100;
}

const particleGeo = new THREE.BufferGeometry();
particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
particleGeo.setAttribute('color',    new THREE.BufferAttribute(colors, 3));
particleGeo.setAttribute('size',     new THREE.BufferAttribute(sizes, 1));

const particleMat = new THREE.PointsMaterial({
  size: 0.08,
  vertexColors: true,
  transparent: true,
  opacity: 0.55,
  sizeAttenuation: true,
  depthWrite: false,
});
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// --- PHOTO PLANES ---
const planes = [];
const loader = new THREE.TextureLoader();
loader.crossOrigin = 'anonymous';

// Spiral layout for photos
PHOTOS.forEach((url, i) => {
  const angle  = (i / PHOTOS.length) * Math.PI * 4;
  const radius = 4 + (i % 3) * 2.5;
  const x = Math.cos(angle) * radius + (Math.random() - 0.5) * 2;
  const y = (i - PHOTOS.length / 2) * 1.6 + (Math.random() - 0.5) * 1.5;
  const z = Math.sin(angle) * radius + (Math.random() - 0.5) * 2;

  const w = 3.2 + Math.random() * 1.2;
  const h = w * 0.75;

  const geo = new THREE.PlaneGeometry(w, h);

  // Pink border frame
  const borderGeo = new THREE.PlaneGeometry(w + 0.06, h + 0.06);
  const borderMat = new THREE.MeshBasicMaterial({
    color: Math.random() > 0.6 ? 0xEA7DFF : 0x08F2DB,
    transparent: true,
    opacity: 0.25,
    side: THREE.DoubleSide,
  });
  const border = new THREE.Mesh(borderGeo, borderMat);

  const mat = new THREE.MeshBasicMaterial({
    color: 0x444444,
    side: THREE.DoubleSide,
    transparent: true,
    opacity: 0,
  });
  const mesh = new THREE.Mesh(geo, mat);

  loader.load(url, (tex) => {
    tex.minFilter = THREE.LinearFilter;
    mesh.material = new THREE.MeshBasicMaterial({
      map: tex,
      side: THREE.DoubleSide,
      transparent: true,
      opacity: 0,
    });
    mesh.material.needsUpdate = true;
  }, undefined, () => {});

  const group = new THREE.Group();
  group.add(border);
  group.add(mesh);
  group.position.set(x, y, z);
  group.rotation.set(
    (Math.random() - 0.5) * 0.3,
    angle + Math.PI / 2 + (Math.random() - 0.5) * 0.4,
    (Math.random() - 0.5) * 0.15
  );

  const floatSpeed  = 0.3 + Math.random() * 0.4;
  const floatAmp    = 0.12 + Math.random() * 0.18;
  const floatOffset = Math.random() * Math.PI * 2;
  const rotSpeed    = (Math.random() - 0.5) * 0.0008;

  planes.push({ group, mesh, floatSpeed, floatAmp, floatOffset, baseY: y, rotSpeed, fadeIn: 0 });
  scene.add(group);
});

// --- CONNECTING LINES (Chaikin-style) ---
const lineMat = new THREE.LineBasicMaterial({
  color: 0xEA7DFF,
  transparent: true,
  opacity: 0.06,
  depthWrite: false,
});
for (let i = 0; i < planes.length - 1; i++) {
  const a = planes[i].group.position;
  const b = planes[i + 1].group.position;
  const mid = new THREE.Vector3(
    (a.x + b.x) / 2 + (Math.random() - 0.5) * 4,
    (a.y + b.y) / 2 + (Math.random() - 0.5) * 3,
    (a.z + b.z) / 2 + (Math.random() - 0.5) * 4,
  );
  const pts = [a, mid, b];
  const curve = new THREE.CatmullRomCurve3(pts);
  const lineGeo = new THREE.BufferGeometry().setFromPoints(curve.getPoints(30));
  scene.add(new THREE.Line(lineGeo, lineMat));
}

// --- ORBIT CONTROLS (manual) ---
let isDragging = false;
let prevMouse = { x: 0, y: 0 };
let spherical = { theta: 0, phi: Math.PI / 2, r: 22 };
let targetSpherical = { ...spherical };

renderer.domElement.addEventListener('mousedown', (e) => {
  isDragging = true;
  prevMouse = { x: e.clientX, y: e.clientY };
});
renderer.domElement.addEventListener('mousemove', (e) => {
  if (!isDragging) return;
  const dx = e.clientX - prevMouse.x;
  const dy = e.clientY - prevMouse.y;
  targetSpherical.theta -= dx * 0.005;
  targetSpherical.phi   = Math.max(0.3, Math.min(Math.PI - 0.3, targetSpherical.phi + dy * 0.005));
  prevMouse = { x: e.clientX, y: e.clientY };
});
renderer.domElement.addEventListener('mouseup', () => isDragging = false);
renderer.domElement.addEventListener('wheel', (e) => {
  targetSpherical.r = Math.max(6, Math.min(40, targetSpherical.r + e.deltaY * 0.03));
});

// Touch support
let prevTouch = null;
renderer.domElement.addEventListener('touchstart', (e) => {
  prevTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
});
renderer.domElement.addEventListener('touchmove', (e) => {
  if (!prevTouch) return;
  const dx = e.touches[0].clientX - prevTouch.x;
  const dy = e.touches[0].clientY - prevTouch.y;
  targetSpherical.theta -= dx * 0.006;
  targetSpherical.phi   = Math.max(0.3, Math.min(Math.PI - 0.3, targetSpherical.phi + dy * 0.006));
  prevTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  e.preventDefault();
}, { passive: false });
renderer.domElement.addEventListener('touchend', () => prevTouch = null);

// --- ANIMATION ---
let t = 0;
function animate() {
  requestAnimationFrame(animate);
  t += 0.008;

  // Smooth camera orbit
  spherical.theta += (targetSpherical.theta - spherical.theta) * 0.06;
  spherical.phi   += (targetSpherical.phi   - spherical.phi)   * 0.06;
  spherical.r     += (targetSpherical.r     - spherical.r)     * 0.06;

  // Auto-rotate when idle
  if (!isDragging) targetSpherical.theta += 0.0008;

  camera.position.set(
    spherical.r * Math.sin(spherical.phi) * Math.sin(spherical.theta),
    spherical.r * Math.cos(spherical.phi),
    spherical.r * Math.sin(spherical.phi) * Math.cos(spherical.theta),
  );
  camera.lookAt(0, 0, 0);

  // Float photos + fade in
  planes.forEach((p) => {
    p.fadeIn = Math.min(1, p.fadeIn + 0.004);
    if (p.mesh.material.opacity !== undefined) {
      p.mesh.material.opacity = p.fadeIn * 0.92;
    }
    p.group.position.y = p.baseY + Math.sin(t * p.floatSpeed + p.floatOffset) * p.floatAmp;
    p.group.rotation.y += p.rotSpeed;
  });

  // Animate particles with Perlin noise
  const pos = particleGeo.attributes.position;
  for (let i = 0; i < PARTICLE_COUNT; i++) {
    const nx = noiseOffsets[i*3]   + t * 0.18;
    const ny = noiseOffsets[i*3+1] + t * 0.14;
    const nz = noiseOffsets[i*3+2] + t * 0.11;
    const n  = noise3(nx, ny, nz);
    pos.array[i*3]   += Math.sin(n * Math.PI * 2) * 0.008;
    pos.array[i*3+1] += Math.cos(n * Math.PI * 2) * 0.006;
    pos.array[i*3+2] += Math.sin(n * Math.PI * 1.5) * 0.007;

    // Soft boundary — drift back toward origin
    const dist = Math.sqrt(
      pos.array[i*3]**2 + pos.array[i*3+1]**2 + pos.array[i*3+2]**2
    );
    if (dist > 20) {
      pos.array[i*3]   *= 0.985;
      pos.array[i*3+1] *= 0.985;
      pos.array[i*3+2] *= 0.985;
    }
  }
  pos.needsUpdate = true;

  // Pulse particle opacity
  particleMat.opacity = 0.45 + Math.sin(t * 0.7) * 0.1;

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
