<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>The Atelier Space</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #EA7DFF; }

  #room-label {
    position: absolute; top: 20px; left: 24px;
    z-index: 10; pointer-events: none;
  }
  #room-label .eyebrow {
    font-family: 'Courier New', monospace; font-size: 10px;
    letter-spacing: 0.15em; text-transform: uppercase;
    color: rgba(34,17,62,0.5); margin-bottom: 3px;
  }
  #room-label .name {
    font-family: Georgia, serif; font-size: 22px;
    color: #22113E; letter-spacing: -0.01em;
  }
  #room-label .desc {
    font-family: 'Courier New', monospace; font-size: 10px;
    color: rgba(34,17,62,0.4); margin-top: 2px;
  }

  #hint {
    position: absolute; bottom: 20px; left: 50%;
    transform: translateX(-50%);
    font-family: 'Courier New', monospace; font-size: 10px;
    letter-spacing: 0.15em; text-transform: uppercase;
    color: rgba(34,17,62,0.35); pointer-events: none; white-space: nowrap;
  }

  #minimap-wrap {
    position: absolute; top: 16px; right: 16px;
    z-index: 10; background: rgba(255,255,255,0.92);
    border-radius: 6px; padding: 10px 10px 6px; width: 172px;
  }
  #minimap { display: block; width: 152px; height: 148px; }
  #minimap-label {
    font-family: 'Courier New', monospace; font-size: 9px;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: rgba(34,17,62,0.35); text-align: center; margin-top: 5px;
  }

  #tooltip {
    position: absolute;
    z-index: 20;
    background: #22113E;
    color: #ffffff;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    padding: 6px 14px;
    border-radius: 4px;
    pointer-events: none;
    display: none;
    white-space: nowrap;
  }
</style>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.161.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.161.0/examples/jsm/"
  }
}
</script>
</head>
<body>

<div id="room-label">
  <div class="eyebrow">Wetzikon | Zürich</div>
  <div class="name" id="room-name">Kitchen</div>
  <div class="desc" id="room-desc">Entrance · First floor</div>
</div>
<div id="hint">drag to look around · click sphere to navigate</div>
<div id="tooltip"></div>

<div id="minimap-wrap">
  <canvas id="minimap" width="152" height="148"></canvas>
  <div id="minimap-label">Floor plan</div>
</div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const PINK        = '#EA7DFF';
const DEEP_PURPLE = '#22113E';
const TURQUOISE   = '#08F2DB';

// ── WORLD POSITIONS (x, z) based on floor plan
// Y is always 1.6 (eye level for spheres) or 2.1 (photo plane center)
// Scale: ~1 unit = ~1.5m
const WORLD = {
  'entrance':       [ -10,   12 ],
  'kitchen':        [ -5,   5 ],
  'dance-studio':   [ -2,   0 ],
  'biolab':         [ -5,   1 ],
  'saloon':         [  1,   2 ],
  'studio':         [  4,   4 ],
  'dirty-workshop': [  5,   0 ],
  'office':         [  4,  -5 ],
};

// ── NODE MAP ──
const nodes = {
  entrance: {
    label: 'Entrance',
    desc: 'Ground floor · Building door',
    photo: 'imgs/space/entrance.gif',
  },
  kitchen: {
    label: 'Kitchen', desc: 'Staircase · First floor',
    photo: 'imgs/space/kitchen.webp',
  },
  'dance-studio': {
    label: 'Dance Studio', desc: 'Main open space',
    photo: 'imgs/space/dance-studio.webp',
  },
  biolab: {
    label: 'Biolab', desc: 'Research & experiments',
    photo: 'imgs/space/biolab.webp',
  },
  saloon: {
    label: 'Saloon', desc: 'Central gathering space',
    photo: 'imgs/space/saloon.webp',
  },
  studio: {
    label: 'Studio', desc: "School of Tomorrow's AI",
    photo: 'imgs/space/studio.webp',
  },
  'dirty-workshop': {
    label: 'Dirty Workshop', desc: 'Fabrication & making',
    photo: 'imgs/space/dirty-workshop.webp',
  },
  office: {
    label: 'Office', desc: 'Admin & quiet work',
    photo: 'imgs/space/office.webp',
  },
};

// Minimap layout (normalized 0..1 from SVG)
const SVG_W = 1142, SVG_H = 1103;
const MINIMAP_POS = {
  'entrance':       [286/SVG_W, 980/SVG_H],
  'kitchen':        [286/SVG_W, 872/SVG_H],
  'dance-studio':   [400/SVG_W, 500/SVG_H],
  'biolab':         [294/SVG_W, 608/SVG_H],
  'saloon':         [564/SVG_W, 664/SVG_H],
  'studio':         [773/SVG_W, 768/SVG_H],
  'dirty-workshop': [903/SVG_W, 509/SVG_H],
  'office':         [835/SVG_W, 214/SVG_H],
};

const FLOOR_POLY = [
  [168,86],[957,90],[961,982],[692,985],
  [691,896],[465,894],[256,705],[168,703],[168,86]
].map(([x,y])=>[x/SVG_W, y/SVG_H]);

const WALLS = [
  [[0.147,0.453],[0.620,0.459]],
  [[0.620,0.079],[0.620,0.459]],
  [[0.839,0.320],[0.839,0.906]],
  [[0.840,0.605],[0.960,0.606]],
];

// ── THREE ──
const scene = new THREE.Scene();
scene.background = new THREE.Color(PINK);
scene.fog = new THREE.FogExp2(PINK, 0.025);

const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 120);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.enablePan = false;
controls.minDistance = 2;
controls.maxDistance = 24;

scene.add(new THREE.AmbientLight(0xffffff, 1.3));
const dir = new THREE.DirectionalLight(0xffffff, 0.5);
dir.position.set(5, 10, 5);
scene.add(dir);

const raycaster = new THREE.Raycaster();
const mouse     = new THREE.Vector2();

// Clickable objects (spheres of other rooms)
const clickables = [];

// Per-room objects
const roomObjects = {}; // id → { photo: Mesh, sphere: Mesh }

let currentId = 'kitchen';
let moveStart = null, moveEnd = null, moveT = 1;
const MOVE_DUR = 0.85;
const clock = new THREE.Clock();

// ── PLACEHOLDER TEXTURE ──
function placeholder(label, desc) {
  const W = 1200, H = 800;
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const x = c.getContext('2d');
  x.fillStyle = 'rgba(255,255,255,0.1)'; x.fillRect(0,0,W,H);
  const g = x.createLinearGradient(0,0,W,H);
  g.addColorStop(0,'rgba(255,255,255,0.18)'); g.addColorStop(1,'rgba(0,0,0,0.06)');
  x.fillStyle=g; x.fillRect(0,0,W,H);
  x.strokeStyle='rgba(255,255,255,0.9)'; x.lineWidth=14;
  x.strokeRect(36,36,W-72,H-72);
  x.strokeStyle='rgba(255,255,255,0.3)'; x.lineWidth=2;
  x.setLineDash([12,9]); x.strokeRect(80,80,W-160,H-160); x.setLineDash([]);
  x.beginPath();
  x.moveTo(W/2,100); x.lineTo(W/2,H-100);
  x.moveTo(100,H/2); x.lineTo(W-100,H/2);
  x.strokeStyle='rgba(255,255,255,0.2)'; x.lineWidth=1; x.stroke();
  x.fillStyle='rgba(255,255,255,0.55)'; x.fillRect(W/2-28,H/2-50,56,3);
  x.fillStyle='rgba(255,255,255,0.95)';
  x.textAlign='center'; x.font='bold 54px Arial';
  x.fillText(label, W/2, H/2-10);
  x.font='26px Arial'; x.fillStyle='rgba(255,255,255,0.65)';
  x.fillText(desc, W/2, H/2+38);
  x.font='17px Courier New'; x.fillStyle='rgba(255,255,255,0.38)';
  x.fillText('placeholder · replace with real photo', W/2, H/2+78);
  const t = new THREE.CanvasTexture(c);
  t.colorSpace = THREE.SRGBColorSpace;
  return t;
}

// ── LOAD TEXTURE ──
function loadTex(node, cb) {
  const img = document.createElement('img');
  img.style.display='none'; document.body.appendChild(img);
  img.onload = () => {
    const t = new THREE.Texture(img);
    t.minFilter = THREE.LinearFilter;
    t.colorSpace = THREE.SRGBColorSpace;
    t.needsUpdate = true;
    document.body.removeChild(img); cb(t);
  };
  img.onerror = () => { document.body.removeChild(img); cb(placeholder(node.label, node.desc)); };
  img.src = node.photo;
}

// ── SPHERE TEXTURE ──
function makeSphereTexture(color) {
  const c = document.createElement('canvas');
  c.width = c.height = 128;
  const x = c.getContext('2d');
  const g = x.createRadialGradient(56,52,4, 64,64,56);
  g.addColorStop(0,'rgba(255,255,255,0.98)');
  g.addColorStop(0.6,'rgba(255,255,255,0.82)');
  g.addColorStop(1,'rgba(255,255,255,0.3)');
  x.beginPath(); x.arc(64,64,56,0,Math.PI*2);
  x.fillStyle=g; x.fill();
  const t = new THREE.CanvasTexture(c);
  return t;
}

// ── BUILD ALL ROOMS IN 3D ──
function buildScene() {
  // photo plane for EACH room (hidden unless active)
  Object.entries(nodes).forEach(([id, node]) => {
    const [wx, wz] = WORLD[id];

    // Photo plane
    const geo = new THREE.PlaneGeometry(8, 5.2);
    const mat = new THREE.MeshBasicMaterial({
      color: 0x999999, side: THREE.DoubleSide, transparent: true, opacity: 0
    });
    const plane = new THREE.Mesh(geo, mat);
    const planeY = id === 'entrance' ? 1.4 : 2.1;
    plane.position.set(wx, planeY, wz - 4);
    scene.add(plane);

    // Sphere
    const sGeo = new THREE.SphereGeometry(0.3, 32, 32);
    const sMat = new THREE.MeshBasicMaterial({
      color: 0xffffff, transparent: true, opacity: 0.92
    });
    const sphere = new THREE.Mesh(sGeo, sMat);
    sphere.position.set(wx, 1.6, wz);
    sphere.userData = { id, label: node.label };
    scene.add(sphere);
    clickables.push(sphere);

    roomObjects[id] = { plane, sphere };

    // Load texture
    loadTex(node, (tex) => {
      plane.material = new THREE.MeshBasicMaterial({
        map: tex, side: THREE.DoubleSide, transparent: true, opacity: 0
      });
    });
  });
}

// ── UPDATE VISIBILITY based on active room ──
function updateScene(activeId) {
  const [ax, az] = WORLD[activeId];

  Object.entries(roomObjects).forEach(([id, objs]) => {
    const [wx, wz] = WORLD[id];
    const dist = Math.sqrt((wx-ax)**2 + (wz-az)**2);
    const isActive = id === activeId;

    // Photo: only show for active room
    const targetPhotoOpacity = isActive ? 1 : 0;
    const photo = objs.plane;
    let f = isActive ? 0 : 1;
    if (isActive) {
      const fi = setInterval(() => {
        f += 0.04;
        if (photo.material) photo.material.opacity = Math.min(f, 1);
        if (f >= 1) clearInterval(fi);
      }, 16);
    } else {
      if (photo.material) photo.material.opacity = 0;
    }

    // Sphere: hide when active, show for others
    // Opacity decreases with distance: max 0.92, min 0.25
    const maxDist = 12;
    const sphereOpacity = isActive ? 0 : Math.max(0.25, 0.92 - (dist/maxDist)*0.67);
    objs.sphere.material.opacity = sphereOpacity;
    objs.sphere.visible = !isActive;

    // Sphere size: closer = slightly bigger
    const scale = isActive ? 0 : Math.max(0.6, 1.2 - dist*0.04);
    objs.sphere.scale.setScalar(scale);
  });
}

// ── SET ACTIVE ROOM ──
function setRoom(id) {
  const node = nodes[id]; if (!node) return;
  const [wx, wz] = WORLD[id];

  currentId = id;
  updateScene(id);

  // Camera positioned behind the room, looking at the photo plane
  moveStart = { camPos: camera.position.clone(), target: controls.target.clone() };
  const floorY = id === 'entrance' ? 0.8 : 1.6;
  const photoY = id === 'entrance' ? 1.4 : 2.1;
  moveEnd = {
    camPos: new THREE.Vector3(wx, floorY, wz + 6),
    target: new THREE.Vector3(wx, floorY, wz)
  };
  moveT = 0;

  document.getElementById('room-name').textContent = node.label;
  document.getElementById('room-desc').textContent = node.desc;
  drawMinimap(id);
}

// ── MINIMAP ──
const mc  = document.getElementById('minimap');
const mx2 = mc.getContext('2d');
const MW = 152, MH = 148;

function drawMinimap(activeId) {
  mx2.clearRect(0,0,MW,MH);
  mx2.beginPath();
  FLOOR_POLY.forEach(([fx,fy],i) => i===0 ? mx2.moveTo(fx*MW,fy*MH) : mx2.lineTo(fx*MW,fy*MH));
  mx2.closePath();
  mx2.fillStyle='rgba(202,216,216,0.35)'; mx2.fill();
  mx2.strokeStyle=DEEP_PURPLE; mx2.lineWidth=1.5; mx2.stroke();

  WALLS.forEach(([a,b]) => {
    mx2.beginPath();
    mx2.moveTo(a[0]*MW,a[1]*MH); mx2.lineTo(b[0]*MW,b[1]*MH);
    mx2.strokeStyle='rgba(34,17,62,0.25)'; mx2.lineWidth=1; mx2.stroke();
  });

  Object.entries(MINIMAP_POS).forEach(([id,[fx,fy]]) => {
    const active = id===activeId;
    const px=fx*MW, py=fy*MH;
    mx2.beginPath();
    mx2.arc(px,py,active?8:4,0,Math.PI*2);
    mx2.fillStyle = active ? PINK : 'rgba(34,17,62,0.3)';
    mx2.fill();
    if (active) {
      mx2.strokeStyle=DEEP_PURPLE; mx2.lineWidth=1.5; mx2.stroke();
      mx2.fillStyle=DEEP_PURPLE; mx2.font='bold 8px Courier New';
      mx2.textAlign='center';
      mx2.fillText(nodes[id].label, px, py-12);
    }
  });
}

// ── EVENTS ──
const tooltip = document.getElementById('tooltip');

renderer.domElement.addEventListener('pointermove', e => {
  mouse.x = (e.clientX/innerWidth)*2-1;
  mouse.y = -(e.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(clickables.filter(c=>c.visible), false);
  if (hits.length) {
    renderer.domElement.style.cursor='pointer';
    tooltip.style.display='block';
    tooltip.style.left=(e.clientX+14)+'px';
    tooltip.style.top=(e.clientY-8)+'px';
    tooltip.textContent = hits[0].object.userData.label;
  } else {
    renderer.domElement.style.cursor='';
    tooltip.style.display='none';
  }
});

renderer.domElement.addEventListener('pointerdown', e => {
  mouse.x = (e.clientX/innerWidth)*2-1;
  mouse.y = -(e.clientY/innerHeight)*2+1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(clickables.filter(c=>c.visible), false);
  if (hits.length) setRoom(hits[0].object.userData.id);
});

mc.style.cursor='pointer';
mc.addEventListener('click', e => {
  const rect=mc.getBoundingClientRect();
  const cx=(e.clientX-rect.left)*(MW/rect.width);
  const cy=(e.clientY-rect.top)*(MH/rect.height);
  let closest=null, best=Infinity;
  Object.entries(MINIMAP_POS).forEach(([id,[fx,fy]])=>{
    const d=Math.hypot(fx*MW-cx, fy*MH-cy);
    if(d<16&&d<best){best=d;closest=id;}
  });
  if(closest&&closest!==currentId) setRoom(closest);
});

addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

// ── LOOP ──
function easeOut(t){return 1-Math.pow(1-t,3);}

function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta();

  if(moveT<1&&moveStart&&moveEnd){
    moveT=Math.min(moveT+dt/MOVE_DUR,1);
    const e=easeOut(moveT);
    camera.position.lerpVectors(moveStart.camPos,moveEnd.camPos,e);
    controls.target.lerpVectors(moveStart.target,moveEnd.target,e);
  }

  // Spheres pulse
  const pulse=1+0.07*Math.sin(Date.now()*0.003);
  Object.values(roomObjects).forEach(o=>{
    if(o.sphere.visible) o.sphere.scale.setScalar(
      o.sphere.scale.x * (pulse/Math.max(o.sphere.scale.x,0.01) * o.sphere.scale.x / o.sphere.scale.x)
    );
  });

  controls.update();
  renderer.render(scene,camera);
}

// ── INIT ──
buildScene();
setRoom('entrance');
animate();
</script>
</body>
</html>
